plugin {
    hyprsplit {
        num_workspaces = 6
    }
}

source = ~/.config/hypr/variables.conf
source = ~/.config/hypr/window.conf
source = ~/.config/hypr/keybinds.conf

exec-once = otd-daemon & waybar & swww-daemon
exec-once = hyprpm reload -n
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = swww img /home/alex/images/hard_seal_2.jpg

monitor = HDMI-A-1, 1920x1080@239.96Hz, 0x0, 1
monitor = eDP-1, highrr, auto-left, 1.25

exec-once = xrandr --output HDMI-A-1 --primary 

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

input {
    kb_layout = us, si
    kb_options = grp:win_space_toggle,ctrl:nocaps

    sensitivity = -0.1
}

xwayland {
    force_zero_scaling = true
}
