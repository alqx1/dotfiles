$terminal = alacritty
$fileManager = thunar
$menu = wofi --show drun --insensitive true

$screenshot_save = grim -g "$(slurp)" -o "$HOME/screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png"
$screenshot_copy = grim -g "$(slurp)" - | wl-copy

$pick_color = hyprpicker | wl-copy

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
